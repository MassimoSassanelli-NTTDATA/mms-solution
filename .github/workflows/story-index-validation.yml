name: Story Index Validation

on:
  workflow_dispatch:
    inputs:
      story_issue_number:
        required: true
        type: string

jobs:
  validate-story-index:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - name: Validate story index against GitHub sub-issues
        env:
          GH_TOKEN: ${{ secrets.MULTI_REPO_TOKEN }}
          STORY_ISSUE_NUMBER: ${{ inputs.story_issue_number }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          REPORT="story-index-validation-report.md"
          echo "# Story Index Validation Report" > "$REPORT"
          gh api -H "Accept: application/vnd.github+json" "/repos/${OWNER}/${REPO}/issues/${STORY_ISSUE_NUMBER}/sub_issues" >> "$REPORT" || true
      - uses: actions/upload-artifact@v4
        with:
          name: story-index-validation-report
          path: story-index-validation-report.md
