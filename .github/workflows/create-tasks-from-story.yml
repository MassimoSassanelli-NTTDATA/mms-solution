name: Create Tasks From Story

# Creates implementation tasks in the target code repositories, links each task
# as a sub-issue of the parent platform story, applies status/type labels on
# task issues, applies repo labels on the story issue, and moves the story to
# `status:refined`.
#
# Requires MULTI_REPO_TOKEN (writes issues across repositories).

on:
  workflow_dispatch:
    inputs:
      story_issue_number:
        description: Story issue number in the platform repository
        required: true
        type: string
      tasks_json:
        description: >-
          JSON array of tasks. Each item:
          {"repo","title","body","priority?","labels?":[]}.
          Pass the value from a file to avoid quoting issues:
          gh workflow run create-tasks-from-story.yml -f story_issue_number=<n> -F tasks_json=@tasks.json
        required: true
        type: string

jobs:
  create-tasks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Create tasks and link as sub-issues
        uses: actions/github-script@v7
        env:
          STORY_NUMBER: ${{ inputs.story_issue_number }}
          TASKS_JSON: ${{ inputs.tasks_json }}
        with:
          github-token: ${{ secrets.MULTI_REPO_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const platformRepo = context.repo.repo;
            const storyNumber = Number(process.env.STORY_NUMBER);

            let tasks;
            try {
              // Strip a leading UTF-8 BOM (e.g. from PowerShell Set-Content -Encoding utf8).
              const raw = (process.env.TASKS_JSON || '').replace(/^\uFEFF/, '');
              tasks = JSON.parse(raw);
            } catch (e) {
              core.setFailed('Invalid tasks_json (must be valid JSON): ' + e.message);
              return;
            }
            // Tolerate a single task object (PowerShell 5.1 ConvertTo-Json emits an
            // object, not an array, when there is exactly one task).
            if (tasks && !Array.isArray(tasks)) tasks = [tasks];
            if (!Array.isArray(tasks) || tasks.length === 0) {
              core.setFailed('tasks_json must be a JSON array (or a single task object) with at least one task.');
              return;
            }

            const cfg = JSON.parse(fs.readFileSync('.github/copilot-platform.json', 'utf8'));
            const validRepos = Object.keys(cfg.repositories || {});

            // Validate the story exists.
            let story;
            try {
              story = await github.rest.issues.get({ owner, repo: platformRepo, issue_number: storyNumber });
            } catch (e) {
              core.setFailed(`Story #${storyNumber} not found in ${owner}/${platformRepo}: ${e.message}`);
              return;
            }

            const created = [];
            const linkFailures = [];
            for (const t of tasks) {
              if (!t.repo || !validRepos.includes(t.repo)) {
                core.warning(`Skipping task with unknown repo "${t.repo}" (valid: ${validRepos.join(', ')}).`);
                continue;
              }
              if (!t.title) {
                core.warning('Skipping task without a title.');
                continue;
              }

              const labels = ['type:task', 'status:ready'];
              if (t.priority) labels.push(`priority:${t.priority}`);
              if (Array.isArray(t.labels)) {
                // repo:* labels belong to the parent story, not task issues.
                labels.push(...t.labels.filter((l) => typeof l === 'string' && !l.startsWith('repo:')));
              }

              const body =
                (t.body || '') +
                `\n\n---\nParent story: ${owner}/${platformRepo}#${storyNumber}`;

              const issue = await github.rest.issues.create({
                owner,
                repo: t.repo,
                title: t.title,
                body,
                labels,
              });
              created.push({ repo: t.repo, number: issue.data.number, id: issue.data.id, url: issue.data.html_url });

              // Attach as a sub-issue of the parent story.
              try {
                await github.request(
                  'POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                  {
                    owner,
                    repo: platformRepo,
                    issue_number: storyNumber,
                    sub_issue_id: issue.data.id,
                    headers: { 'X-GitHub-Api-Version': '2022-11-28' },
                  }
                );
              } catch (e) {
                const failure = `${issue.data.html_url}: ${e.message}`;
                linkFailures.push(failure);
                core.warning(`Sub-issue link failed for ${failure}`);
              }
            }

            if (created.length === 0) {
              core.setFailed('No tasks were created. Check repo names and titles in the provided task file payload.');
              return;
            }

            if (linkFailures.length > 0) {
              let md = `## Partial success for story #${storyNumber}\n\n`;
              md += `Created tasks: ${created.length}\n\n`;
              md += `Sub-issue link failures: ${linkFailures.length}\n\n`;
              md += '### Failed links\n';
              for (const f of linkFailures) md += `- ${f}\n`;
              await core.summary.addRaw(md).write();
              core.setFailed(
                `Created ${created.length} task(s), but ${linkFailures.length} sub-issue link(s) failed. Story status was not moved to status:refined.`
              );
              return;
            }

            // Collect unique affected repositories for story labels.
            const affectedRepos = [...new Set(created.map((c) => c.repo))];
            const repoLabels = affectedRepos.map((r) => `repo:${r}`);

            // Move the story to status:refined (remove any other status labels first).
            const currentStatus = story.data.labels
              .map((l) => l.name || l)
              .filter((n) => n.startsWith('status:'));
            for (const s of currentStatus) {
              if (s !== 'status:refined') {
                await github.rest.issues
                  .removeLabel({ owner, repo: platformRepo, issue_number: storyNumber, name: s })
                  .catch(() => {});
              }
            }
            await github.rest.issues.addLabels({
              owner,
              repo: platformRepo,
              issue_number: storyNumber,
              labels: ['status:refined', ...repoLabels],
            });

            let md = `## Created ${created.length} task(s) for story #${storyNumber}\n\n`;
            md += '| Repository | Task | Link |\n|---|---|---|\n';
            for (const c of created) md += `| \`${c.repo}\` | #${c.number} | ${c.url} |\n`;
            await core.summary.addRaw(md).write();
